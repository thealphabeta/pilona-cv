## Example Config file
baseURL: "https://thealphabeta.github.io/pilona-cv/"
theme: "terminalcv"
title: "Pilona CV"

params:
  version: "2.0.0"
  description: "My terminal cv"
  blog: true
  prompt:
    core:
      text: "user@terminalCV"
      color: "pink"
      before: "["
      beforeColor: "red"
      after: '\]'
      afterColor: "red"
      # separator: '-'
    separator:
      text: "-"
      # color:
    path:
      before: "["
      beforeColor: "red"
      text: "~/terminalcv"
      color: "blue"
      after: '\]'
      afterColor: "red"
    extra:
      text: ": "
      color: "orange"

  # promptColor: grey
  # promptSimbols: ":~$"
  # promptSimbolsColor: grey
  # startxLocation: https://example.com
  # useLess: true
  listLS: true
  #exitLocation: "about:blank"
  exitMessage: "[Session completed, the browserwindow can be safely closed]"
  source: true
  #use a ‎ (blank character) if your first character of the ascii art is a whitespace
  greetingbannercolor: white
  greetingbanner: |
    ‎  ____  _ _                      ______     __
     |  _ \(_) | ___  _ __   __ _   / ___\ \   / /
     | |_) | | |/ _ \| '_ \ / _` | | |    \ \ / / 
     |  __/| | | (_) | | | | (_| | | |___  \ V /  
     |_|   |_|_|\___/|_| |_|\__,_|  \____|  \_/

  greeting: |
    Welcome to my online resume

    Type 'help' for a list of available commands

  bootsequence: |
    User request detected
    Reserving Cloud Resources
    ............................
    Cloud Network ready
    ........
    Cloud Instance ready
    .......................
    Internet Breakout Ready, but Pong is preferred 

    Inititating CloudOS
    CloudOS Kernel Version 1.4.2: Sat February 29 23:21:41 CEST 2025; root:xnu-1699.22.73~1/RELEASE_ARM_64
    Loglevel = quiet
    ......
    ............
    ..................
    ........................
    ..............................
    ....................................

    Copyright 1979, 1980, 1983, 1986, 1988, 1989, 1991, 1992, 1993, 1994
    The Regents of the University of California. All rights reserved.

    Copyright 2024, 2025
    TerminalCV. MIT License (MIT)

    [CloudOSBoot1]: ready
    [CloudOSBoot2]: ready
    [Webserver]: ready 
    [HUGO]: ready
    [TerminalCV]: ready

    Boot Complete, accepting user input.

